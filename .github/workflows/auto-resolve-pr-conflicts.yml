name: Auto Resolve PR Conflicts

on:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-conflicts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Nécessaire pour avoir l'historique complet des branches

      - name: Update Open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin

          for pr_info in $(gh pr list --state open --json number,headRefName,headRepositoryOwner --jq '.[] | select(.headRepositoryOwner.login == "nickdesi") | "\(.number):\(.headRefName)"'); do
            PR_NUM=$(echo "$pr_info" | cut -d':' -f1)
            PR_BRANCH=$(echo "$pr_info" | cut -d':' -f2)

            echo "----------------------------------------"
            echo "Processing PR #$PR_NUM on branch '$PR_BRANCH'"
            echo "----------------------------------------"

            git checkout "$PR_BRANCH" || git checkout -b "$PR_BRANCH" "origin/$PR_BRANCH"

            if git merge origin/main --no-edit; then
              if git push origin "HEAD:$PR_BRANCH"; then
                echo "PR #$PR_NUM successfully merged with main and pushed."
              else
                echo "Failed to push merged branch for PR #$PR_NUM."
              fi
            else
              echo "PR #$PR_NUM has true conflicts. Aborting merge."
              git merge --abort
            fi
          done
