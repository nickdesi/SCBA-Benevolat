name: Auto Resolve PR Conflicts

on:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-conflicts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Nécessaire pour avoir l'historique complet des branches

      - name: Update Open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pr in $(gh pr list --json number --jq '.[].number'); do
            echo "Updating PR #$pr..."
            gh pr update-branch $pr || echo "Failed to update PR #$pr"
          done
